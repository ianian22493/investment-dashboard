name: 每兩週福岡房市 AI 分析

on:
  # 週二 台灣 08:00 主要觸發；09:30 為備用觸發
  # 腳本內部節流：距上次執行 < 13 天則自動跳過（實現兩週一次）
  schedule:
    - cron: '0 0  * * 2'   # 08:00 台灣（主要）
    - cron: '30 1 * * 2'   # 09:30 台灣（備用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fukuoka:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install google-genai

      - name: 執行福岡房市分析更新
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_fukuoka.py

      - name: Commit 並 Push（若有變更）
        run: |
          git config user.email "bot@investment-dashboard"
          git config user.name "Dashboard Bot"
          git add index.html fukuoka_state.json
          git diff --cached --quiet || git commit -m "🏠 第$(python -c "import json; print(json.load(open('fukuoka_state.json'))['period'])")期福岡房市分析 $(date -u +'%Y-%m-%d')"
          git pull --rebase
          git push
