name: 更新股價資料

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 台灣 09:00（美股昨收）
    - cron: '35 6 * * 1-5'  # 台灣 14:35（台股收盤後）
    - cron: '0 21 * * 1-5'  # 台灣 05:00 隔天（美股收盤後）
  workflow_dispatch:

# 允許 Actions 寫入 repo（commit data.json 需要）
permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴套件
        run: pip install requests yfinance

      - name: 執行資料抓取腳本
        run: python fetch_data.py

      - name: Commit 並 Push data.json
        run: |
          git config user.email "bot@investment-dashboard"
          git config user.name "Dashboard Bot"
          git add data.json
          git diff --cached --quiet || git commit -m "📊 更新股價資料 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
